name: Keep Supabase Project Awake

on:
  schedule:
    # 每天 UTC 时间 0:00 (北京时间早上8:00) 运行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send a request to your website
        run: |
          # 访问网站的任意一个API或页面，触发数据库查询即可
          curl -I https://www.hzcubing.cn/competitions/17
